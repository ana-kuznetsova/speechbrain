# ############################################################################
# Model: Discriminative Sparse Codec for disentanglement
# Encoder: DAC encoder + (CTC/ATT joint) beamsearch + TransformerLM
# ASR Decoder: Transformer Decoder + (CTC/ATT joint) beamsearch + TransformerLM
# losses: CTC + KLdiv (Label Smoothing loss)
# Training: Librispeech 960h
# Authors:  Anastasia Kuznetsova 2026
# ############################################################################
# Seed needs to be set at top of yaml, before objects with parameters are made

seed: 3407
__set_seed: !apply:torch.manual_seed [!ref <seed>]
output_folder: !PLACEHOLDER
output_wer_folder: !ref <output_folder>/
save_folder: !ref <output_folder>/save
train_log: !ref <output_folder>/train_log.txt

data_folder: !PLACEHOLDER
train_splits: ["train-clean-100", "train-clean-360", "train-other-500"]
dev_splits: ["dev-clean"]
test_splits: ["dev-clean", "test-clean", "test-other"]
skip_prep: False
train_csv: !ref <output_folder>/train.csv
valid_csv: !ref <output_folder>/dev-clean.csv
test_csv:
    - !ref <output_folder>/dev-clean.csv
    - !ref <output_folder>/test-clean.csv
    - !ref <output_folder>/test-other.csv

######## Training parameters ########
number_of_epochs: 20
batch_size_exponent: 2
batch_size: 2 ** !ref <batch_size_exponent>
ctc_weight: 0.3
seq_weight: 0.7
grad_accumulation_factor: 1
max_grad_norm: 5.0
loss_reduction: 'batchmean'
sorting: random
num_workers: 4
precision: fp32 # bf16, fp16 or fp32
avg_checkpoints: 10 # Number of checkpoints to average for evaluation

# DAC Parameters

model_type: 16khz
vocab_size: 1024
model_bitrate: 8kbps
num_codebooks: 6 # For 3kbps bitrate
sample_rate: 16000

codec: !new:speechbrain.lobes.models.discrete.dac.DAC
    model_type: !ref <model_type>
    model_bitrate: !ref <model_bitrate>
    quantizer_type: "sparse"
    freeze_sparse_mat: False # whether to freeze the sparsity components
    load_pretrained: True
    tag: latest

# ############################################################################
# Model: SparseCodec
# Audio Tokenizer: Sparse DAC
# ASR encoder: LSTM Encoder
# ASR decoder: Greedy searcher
# ASR Tokens: character
# Speaker embedding: ECAPA-TDNN
# Training: Librispeech 960h
# Authors: Anastasia Kuznetsova 2026
# ############################################################################
# Seed needs to be set at top of yaml, before objects with parameters are made

seed: 1986
__set_seed: !apply:torch.manual_seed [!ref <seed>]
output_folder: ! PLACEHOLDER
output_wer_folder: !ref <output_folder>/wer.txt
save_folder: !ref <output_folder>/save
train_log: !ref <output_folder>/train_log.txt


# Data files
data_folder: !PLACEHOLDER # e.g., /path/to/LibriSpeech
train_splits: ["train-clean-100"]
dev_splits: ["dev-clean"]
test_splits: ["test-clean", "test-other", "dev-other"]
skip_prep: False
verification_trials: True
train_csv: !ref <output_folder>/train.csv
valid_csv: !ref <output_folder>/dev-clean.csv
test_csv:
   - !ref <output_folder>/test-clean.csv
   - !ref <output_folder>/test-other.csv
   - !ref <output_folder>/dev-other.csv

cached_data_folder: !ref <output_folder>/cache


valid_veri_file: !ref <output_folder>/veri_dev.txt
test_veri_file: !ref <output_folder>/veri_test.txt


####################### Training Parameters ####################################
number_of_epochs: 20
batch_size: 16 # This works for 2x GPUs with 32GB
test_batch_size: 1
grad_accumulation_factor: 2
max_grad_norm: 5.0
sorting: descending #random
num_workers: 4
precision: fp32 # bf16, fp16 or fp32loss_reduction: batchmean
valid_search_interval: 1
avg_checkpoints: 10 # Number of checkpoints to average for evaluation
cache_size: 1.e+10

lr_model: 0.001 # @orion_step1: --lr_model~"loguniform(0.0000001,0.1)"
weight_decay: 0.0005


# Training parameters

dynamic_batching: True
max_batch_length_train: 128
max_batch_len_val: 100
num_bucket: 200
shuffle: False # if true re-creates batches at each epoch shuffling examples.
max_batch_ex: 128
batch_ordering: random

dynamic_batch_sampler_train:
   max_batch_length: !ref <max_batch_length_train>
   num_buckets: !ref <num_bucket>
   shuffle: !ref <shuffle>
   batch_ordering: !ref <batch_ordering>
   max_batch_ex: !ref <max_batch_ex>
   drop_last: True

dynamic_batch_sampler_val:
   max_batch_length: !ref <max_batch_len_val>
   num_buckets: !ref <num_bucket>
   shuffle: !ref <shuffle>
   batch_ordering: !ref <batch_ordering>
   max_batch_ex: !ref <max_batch_ex>

dynamic_batch_sampler_test:
   max_batch_length: !ref <max_batch_len_val>
   num_buckets: !ref <num_bucket>
   shuffle: !ref <shuffle>
   batch_ordering: !ref <batch_ordering>
   max_batch_ex: !ref <max_batch_ex>

# Dataloader options
train_dataloader_opts:
   batch_size: !ref <batch_size>
   shuffle: True
   num_workers: !ref <num_workers>
   drop_last: True

valid_dataloader_opts:
   batch_size: !ref <test_batch_size>

test_dataloader_opts:
   batch_size: !ref <test_batch_size>


####################### Model parameters ###########################
# DAC Parameters
model_type: 16khz
vocab_size: 1024
encoder_dim: 1024
model_bitrate: 8kbps
freeze_embedding: False
pretrain_embeddings: False
num_codebooks: 6 # For 3kbps bitrate
sample_rate: 16000

codec: !new:speechbrain.lobes.models.discrete.dac.DAC
    model_type: !ref <model_type>
    model_bitrate: !ref <model_bitrate>
    quantizer_type: "sparse"
    freeze_sparse_mat: False # whether to freeze the sparsity components
    freeze_codec: True
    load_pretrained: True
    tag: latest


# LSTM
activation: !name:torch.nn.Sigmoid
dnn_layers: 2
dnn_neurons: 1024
dropout: 0.2
output_neurons: 31

# BPE parameters
token_type: char  # ["unigram", "bpe", "char"]
character_coverage: 1.0
blank_index: 0
bos_index: 1
eos_index: 2

# Decoding parameters
beam_size: 100
beam_prune_logp: -12.0
token_prune_min_logp: -1.2
prune_history: False

loss_reduction: "sum"
sparse_loss_weight: 1.0
spk_reg_weight: 1.0
spk_aam_loss_weight: 1.0
content_reg_weight: 1.0
spk_loss_weight: 1.0
ctc_weight: 1.0

############################## models ################################

asr_encoder: !new:speechbrain.nnet.RNN.LSTM
   input_shape: [Null, Null, !ref <encoder_dim>]
   num_layers: !ref <dnn_layers>
   bidirectional: True
   dropout: !ref <dropout>
   hidden_size: !ref <dnn_neurons>

ctc_lin: !new:speechbrain.nnet.linear.Linear
   input_size: 2048
   n_neurons: !ref <output_neurons>

## Speaker Embedding branch
out_n_neurons: 397 # Number of speakers in the full set

spk_encoder: !new:speechbrain.lobes.models.ECAPA_TDNN.ECAPA_TDNN
    input_size: !ref <encoder_dim>
    channels: [1024, 1024, 1024, 1024, 3072]
    kernel_sizes: [5, 3, 3, 3, 1]
    dilations: [1, 2, 3, 4, 1]
    groups: [1, 1, 1, 1, 1]
    attention_channels: 128
    lin_neurons: 192

spk_classifier: !new:speechbrain.lobes.models.ECAPA_TDNN.Classifier
    input_size: 192
    out_neurons: !ref <out_n_neurons>

modules:
   asr_encoder: !ref <asr_encoder>
   ctc_lin: !ref <ctc_lin>
   tokenizer: !ref <codec>
   spk_encoder: !ref <spk_encoder>
   spk_classifier: !ref <spk_classifier>

model: !new:torch.nn.ModuleList
   - [!ref <codec>, !ref <asr_encoder>, !ref <ctc_lin>, !ref <spk_encoder>, !ref <spk_classifier>]
####################### Decoding & optimiser ###########################
# Decoding parameters
test_beam_search:
   blank_index: !ref <blank_index>
   beam_size: !ref <beam_size>
   beam_prune_logp: !ref <beam_prune_logp>
   token_prune_min_logp: !ref <token_prune_min_logp>
   prune_history: !ref <prune_history>
   alpha: 0.8
   beta: 1.2

ctc_cost: !name:speechbrain.nnet.losses.ctc_loss
   blank_index: !ref <blank_index>


log_softmax: !new:speechbrain.nnet.activations.Softmax
   apply_log: True

spk_aam_loss: !new:speechbrain.nnet.losses.LogSoftmaxWrapper
    loss_fn: !new:speechbrain.nnet.losses.AdditiveAngularMargin
        margin: 0.2
        scale: 30

scheduler: !new:speechbrain.nnet.schedulers.NewBobScheduler
   initial_value: !ref <lr_model>
   improvement_threshold: 0.0025
   annealing_factor: 0.8
   patient: 0


Adam: !name:torch.optim.AdamW
   lr: !ref <lr_model>
   betas: (0.9, 0.98)
   eps: 0.000000001
   weight_decay: !ref <weight_decay>

############################## Logging and Pretrainer ##########################
checkpointer: !new:speechbrain.utils.checkpoints.Checkpointer
   checkpoints_dir: !ref <save_folder>
   recoverables:
      model: !ref <model>
      scheduler: !ref <scheduler>
      counter: !ref <epoch_counter>


# Functions and classes
epoch_counter: !new:speechbrain.utils.epoch_loop.EpochCounter
   limit: !ref <number_of_epochs>

train_logger: !new:speechbrain.utils.train_logger.FileTrainLogger
    save_file: !ref <train_log>

error_rate_computer: !name:speechbrain.utils.metric_stats.ErrorRateStats

wer_computer: !name:speechbrain.utils.metric_stats.ErrorRateStats

spk_error_stats: !name:speechbrain.utils.metric_stats.MetricStats
    metric: !name:speechbrain.nnet.losses.classification_error
        reduction: batch
spk_verification_metrics: !name:speechbrain.utils.metric_stats.EER

final_verification: True
